<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bijou AI Operations Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { @apply bg-white rounded-xl shadow p-5; }
        .loading { @apply animate-pulse text-gray-400; }
        .error { @apply text-red-600 bg-red-50 p-3 rounded; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Bijou AI Operations</h1>
                <p class="text-gray-600">Real-time command center for autonomous agents</p>
            </div>
            <div class="text-right text-sm text-gray-500">
                <div id="last-refresh">Never refreshed</div>
                <button onclick="loadAll()" class="mt-2 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Refresh Now</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- LinkedIn Posts -->
            <section class="card">
                <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                    📢 LinkedIn Posts
                </h2>
                <div id="publora-posts" class="loading">Loading...</div>
            </section>

            <!-- GitHub Commits -->
            <section class="card">
                <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                    🐛 GitHub Commits
                </h2>
                <div id="github-commits" class="loading">Loading...</div>
            </section>

            <!-- Monday Tasks -->
            <section class="card">
                <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                    ✅ Monday Tasks
                </h2>
                <div id="monday-tasks" class="loading">Loading...</div>
            </section>

            <!-- AgentMail -->
            <section class="card">
                <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                    ✉️ AgentMail
                </h2>
                <div id="agentmail" class="loading">Loading...</div>
            </section>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
